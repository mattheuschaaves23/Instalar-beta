databases:
  - name: bem-instalado-db
    databaseName: bem_instalado
    user: bem_instalado
    plan: starter

services:
  - type: web
    name: bem-instalado
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install && npm run build:web
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bem-instalado-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_PIX_EXPIRATION_MINUTES
        value: 30
      - key: MERCADOPAGO_STATEMENT_DESCRIPTOR
        value: BEM INSTALADO
